    runs-on: ubuntu-latest
    steps: 
      - name: checkout actions
        uses: actions/checkout@v3

      - name: set up python 3.9
        uses: actions/setup-python@v4
        with: 
          python-version : '3.9'

      # - name: set up ffmpeg
