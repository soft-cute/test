name: Greeting from Mona
on: push

jobs:
  my-job:
    name: My Job
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: 
          python-version : '3.9'
      - name: Print a greeting
        run: |
          git -v
          ls -a
          echo ${{ secrets.test }}
          curl -i https://www.douyu.com
          python -V
          pip show pip
