name: Greeting from Mona
on: push

env: 
  TZ: Asia/Shanghai
  DOUYIN-COOKIES: ${{ secrets.test }}
jobs:
  my-job:
    name: My Job
    runs-on: ubuntu-latest
    steps: 
      - name: checkout actions
        uses: actions/checkout@v3

      - name: set up python 3.9
        uses: actions/setup-python@v4
        with: 
          python-version : '3.9'

      # - name: set up ffmpeg
      #   uses: FedericoCarboni/setup-ffmpeg@v2

      - name: set up ffmpeg
        run: |
          uname -a
          sudo apt update
          sudo apt install -y ffmpeg
      - name: Setup Debug Session
        uses: csexton/debugger-action@master

      - name: set up node 14.8
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: running
        run: |
          pip install aligo

          git config --local user.email "git@qq.com"
          git config --local user.name "Ezong"
          mkdir -p ~/.aligo/
          cat >> ~/.aligo/aligo.json << EOF
          ${{ secrets.test }}
          EOF
          # python aa.py
          curl -i ip.3322.net
          bash -c 'ffmpeg -t 19800 -i "http://pull-flv-l26.douyincdn.com/stage/stream-401372432472998027_or4.flv?expire=6486c3d0&sign=0e3250e307c7d3dfbe12a6fb62919932"  -c:a copy -c:v copy -f segment -segment_time 3600 -strftime 1 %Y-%m-%d-%H-%M-%S.mp4'
          

      #     git commit -a -m "Add changes"
