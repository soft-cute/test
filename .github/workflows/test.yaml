name: Greeting from Mona
on: push

jobs:
  my-job:
    name: My Job
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: 
          python-version : '3.9'
      - uses: FedericoCarboni/setup-ffmpeg@v2
      - uses: actions/setup-node@v3
        with:
          node-version: '14.8'
      - name: Print a greeting
        run: |
          ffmpeg -version
          echo ${{secrets.test}}
          which node
