name: Greeting from Mona
on: push

env: 
  TZ: Asia/Shanghai
  DOUYIN-COOKIES: ${{ secrets.test }}
jobs:
  my-job:
    name: My Job
    runs-on: ubuntu-latest
    steps: 
      - name: checkout actions
        uses: actions/checkout@v3

      - name: set up python 3.9
        uses: actions/setup-python@v4
        with: 
          python-version : '3.9'

      # - name: set up ffmpeg
      #   uses: FedericoCarboni/setup-ffmpeg@v2

      - name: set up ffmpeg
        run: |
          git clone git@github.com:FFmpeg/FFmpeg.git
          cd ffmpeg
          sudo apt install -y aptitude
          sudo aptitude install -y build-essential
          sudo aptitude install -y yasm nasm
          sudo apt-get install -y libgmp3-dev
          sudo apt install -y pkg-config gnutls-bin
          sudo aptitude install -y libaom-dev libass-dev libbluray-dev libfdk-aac-dev libmp3lame-dev libopencore-amrnb-dev libopencore-amrwb-dev libopenmpt-dev libopus-dev libshine-dev libsnappy-dev libsoxr-dev libspeex-dev libtheora-dev libtwolame-dev libvo-amrwbenc-dev llibvpx-dev libwavpack-dev libwebp-dev libx264-dev libx265-dev libxvidcore-dev liblzma-dev
          ./configure --prefix=/usr/FFmpeg --enable-shared --enable-gpl --enable-version3 --enable-sdl2 --enable-fontconfig --enable-gnutls --enable-iconv --enable-libass --enable-libbluray --enable-libmp3lame --enable-libopencore-amrnb --enable-libopencore-amrwb --enable-libopus --enable-libshine --enable-libsnappy --enable-libsoxr --enable-libtheora --enable-libtwolame --enable-libvpx --enable-libwavpack --enable-libwebp --enable-libx264 --enable-libx265 --enable-libxml2 --enable-lzma --enable-zlib --enable-gmp --enable-libvorbis --enable-libvo-amrwbenc --enable-libspeex --enable-libxvid --enable-libaom --enable-avisynth --enable-libopenmpt --enable-libfdk-aac --enable-nonfree
          sudo make
          sudo make install
          
      - name: Setup Debug Session
        uses: csexton/debugger-action@master

      - name: set up node 14.8
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: running
        run: |
          pip install aligo

          git config --local user.email "git@qq.com"
          git config --local user.name "Ezong"
          mkdir -p ~/.aligo/
          python aa.py
          ls

      #     git commit -a -m "Add changes"
      # - name: Push changes
      #   uses: ad-m/github-push-action@master
      #   with:
      #     github_token: ${{ secrets.github_token }}
      #     branch: ${{ github.ref }}