name: Greeting from Mona
on: push

env: 
  TZ: Asia/Shanghai
  DOUYIN-COOKIES: ${{ secrets.test }}
jobs:
  my-job:
    name: My Job
    runs-on: debian-latest
    steps: 
      - name: checkout actions
        uses: actions/checkout@v3

      - name: set up python 3.9
        uses: actions/setup-python@v4
        with: 
          python-version : '3.9'

      # - name: set up ffmpeg
      #   uses: FedericoCarboni/setup-ffmpeg@v2

      - name: set up ffmpeg
        run: |
          git clone git@github.com:FFmpeg/FFmpeg.git ~/ffmpeg
          cd ~/ffmpeg
          sudo apt install -y aptitude
          sudo aptitude install -y build-essential
          sudo aptitude install -y yasm nasm
          sudo apt-get install -y libgmp3-dev
          sudo apt install -y pkg-config gnutls-bin
          aptitude install -y libaom-dev 
          aptitude install -y libass-dev 
          aptitude install -y libbluray-dev 
          aptitude install -y libfdk-aac-dev 
          aptitude install -y libmp3lame-dev 
          aptitude install -y libopencore-amrnb-dev 
          aptitude install -y libopencore-amrwb-dev 
          aptitude install -y libopenmpt-dev 
          aptitude install -y libopus-dev 
          aptitude install -y libshine-dev 
          aptitude install -y libsnappy-dev 
          aptitude install -y libsoxr-dev 
          aptitude install -y libspeex-dev 
          aptitude install -y libtheora-dev 
          aptitude install -y libtwolame-dev 
          aptitude install -y libvo-amrwbenc-dev 
          aptitude install -y libwavpack-dev 
          aptitude install -y libwebp-dev 
          aptitude install -y libx264-dev 
          aptitude install -y libx265-dev 
          aptitude install -y libxvidcore-dev 
          aptitude install -y liblzma-dev
          ./ffmpeg-5.1.3/configure --prefix=/usr/local/ffmpeg --enable-shared --enable-gpl --enable-version3 --enable-sdl2 --enable-fontconfig --enable-gnutls --enable-iconv --enable-libass --enable-libbluray --enable-libmp3lame --enable-libopencore-amrnb --enable-libopencore-amrwb --enable-libopus --enable-libshine --enable-libsnappy --enable-libsoxr --enable-libtheora --enable-libtwolame --enable-libvpx --enable-libwebp --enable-libx264 --enable-libx265 --enable-libxml2 --enable-lzma --enable-zlib --enable-gmp --enable-libvorbis --enable-libvo-amrwbenc --enable-libspeex --enable-libxvid --enable-libaom --enable-avisynth --enable-libopenmpt --enable-libfdk-aac --enable-nonfree
          sudo make
          sudo make install

      - name: Setup Debug Session
        uses: csexton/debugger-action@master

      - name: set up node 14.8
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: running
        run: |
          pip install aligo

          git config --local user.email "git@qq.com"
          git config --local user.name "Ezong"
          mkdir -p ~/.aligo/
          python aa.py
          ls

      #     git commit -a -m "Add changes"
      # - name: Push changes
      #   uses: ad-m/github-push-action@master
      #   with:
      #     github_token: ${{ secrets.github_token }}
      #     branch: ${{ github.ref }}